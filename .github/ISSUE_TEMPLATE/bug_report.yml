name: Bug Report
description: Report a simulation bug, test failure, or incorrect behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Critical — Axiom violation or conservation breach"
        - "High — Test failure or incorrect simulation output"
        - "Medium — Functional issue, workaround exists"
        - "Low — Cosmetic or documentation"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Output of git rev-parse HEAD
    validations:
      required: true
